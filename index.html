<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PTY's Kitchen POS</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  
  h1 { 
    text-align: center; 
    color: #ff69b4; 
  }
  
  .menu {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    max-width: 800px;
    margin: 20px auto;
  }
  .menu button {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 15px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #f9f9f9;
    text-align: center;
    min-height: 70px;
  }
  .menu button:hover { background: #e6f7ff; }
  .order, .kitchen-queue, .sales-log {
    margin-top: 20px;
    border: 1px solid #ddd;
    padding: 15px;
    border-radius: 10px;
  }
  .kitchen-queue {
    border-color: #ffe58f;
    background-color: #fffbe6;
  }
  
  .sales-table-wrapper {
    max-height: 250px;
    overflow-y: auto;
    margin-top: 10px;
    border: 1px solid #eee;
  }
  
  table { width: 100%; border-collapse: collapse; }
  th { position: sticky; top: 0; background: white; z-index: 1; }
  th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
  input, select { padding: 6px; font-size: 16px; width: 140px; }
  .total { font-weight: bold; font-size: 18px; }
  .complete {
    background: green;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  .ready-btn {
    background: #52c41a;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-weight: bold;
  }
  .ready-btn:hover { background: #389e0d; }
  .remove-btn {
    background: red;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
  }
  .sales-total {
    font-weight: bold;
    font-size: 20px;
    color: green;
    margin-top: 10px;
    text-align: right;
  }
  #exportBtn {
    margin-top: 10px;
    padding: 8px 12px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>PTY's Kitchen</h1>

<div class="menu" id="menu"></div>

<div class="order">
  <h2>Current Order</h2>
  <table id="orderTable">
    <tr><th>Item</th><th>Flavor</th><th>Qty</th><th>Price</th><th></th></tr>
  </table>
  <p class="total">Total: $<span id="total">0.00</span></p>

  <label>Payment Method:
    <select id="paymentMethod" onchange="updateChange()">
      <option value="Cash">Cash</option>
      <option value="Venmo">Venmo</option>
      <option value="CashApp">CashApp</option>
    </select>
  </label>
  
  <label id="paidLabel">Paid: $ <input type="text" id="paid" inputmode="numeric" placeholder="0.00" oninput="handleCashInput(this)"></label>
  <p>Change: $<span id="change">0.00</span></p>
  <button class="complete" onclick="sendToKitchen()">Send to Kitchen</button>
</div>

<div class="kitchen-queue">
  <h2>Kitchen Queue (Pending Prep)</h2>
  <table id="kitchenTable">
    <tr><th>Order #</th><th>Items to Prepare</th><th>Payment</th><th>Action</th></tr>
  </table>
</div>

<div class="sales-log">
  <h2>Completed Orders</h2>
  <div class="sales-table-wrapper">
    <table id="salesLog">
      <tr><th>Order #</th><th>Items</th><th>Total</th><th>Payment</th></tr>
    </table>
  </div>
  <p class="sales-total">Total Sales: $<span id="salesTotal">0.00</span></p>
  <button id="exportBtn" onclick="exportSalesCSV()">Export Completed Orders</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, doc, deleteDoc, onSnapshot, query, orderBy 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ⚠️ TODO: Replace with YOUR specific Firebase configuration block
  const firebaseConfig = {
    apiKey: "AIzaSyAcoZjdtKwRy-t03zySE_2WmNWrFLpu_Fg",
  authDomain: "ptys-kitchen-pos.firebaseapp.com",
  projectId: "ptys-kitchen-pos",
  storageBucket: "ptys-kitchen-pos.firebasestorage.app",
  messagingSenderId: "393916757457",
  appId: "1:393916757457:web:4039686b42171bcf99dcf0"
};

  // Initialize Firebase Connection
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Link UI functions globally so your HTML buttons can still find them
  window.addToOrder = addToOrder;
  window.removeFromOrder = removeFromOrder;
  window.setFlavor = setFlavor;
  window.handleCashInput = handleCashInput;
  window.updateChange = updateChange;
  window.sendToKitchen = sendToKitchen;
  window.finishOrder = finishOrder;
  window.exportSalesCSV = exportSalesCSV;

  const menuItems = [
    { name: "Egg Roll (2)", price: 5.00 },
    { name: "Crab Rangoon (2)", price: 4.00 },
    { name: "Stuffed Chicken Wing", price: 5.00 },
    { name: "Spring Roll", price: 3.00 },
    { name: "Fried Dumpling (4)", price: 3.00 },
    { name: "Chicken Thigh", price: 6.00 },
    { name: "Chicken Skewers", price: 4.00 },
    { name: "Boba Tea", price: 7.00 },
    { name: "Thai Iced Tea", price: 7.00 },
    { name: "Thai Iced Coffee", price: 7.00 },
    { name: "Water", price: 2.00 },
    { name: "Soda", price: 2.00 },
    { name: "Small Popcorn", price: 8.00 },
    { name: "Large Popcorn", price: 12.00 }
  ];

  const bobaFlavors = ["Mango", "Strawberry", "Coconut", "Honey Dew", "Coffee", "Taro", "Milk Tea", "Thai Tea"];

  let order = {};
  let orderTotal = 0;

  // --- Render Menu buttons ---
  const menuDiv = document.getElementById("menu");
  menuItems.forEach(item => {
    const btn = document.createElement("button");
    btn.innerHTML = `<strong>${item.name}</strong><span>$${item.price.toFixed(2)}</span>`;
    btn.onclick = () => addToOrder(item);
    menuDiv.appendChild(btn);
  });

  function addToOrder(item) {
    const defaultFlavor = (item.name === "Boba Tea") ? bobaFlavors[0] : "";
    if (!order[item.name]) order[item.name] = { qty: 0, price: item.price, flavor: defaultFlavor };
    order[item.name].qty++;
    renderOrder();
  }

  function removeFromOrder(itemName) {
    if (!order[itemName]) return;
    order[itemName].qty--;
    if (order[itemName].qty <= 0) delete order[itemName];
    renderOrder();
  }

  function setFlavor(itemName, flavor) {
    if (order[itemName]) order[itemName].flavor = flavor;
  }

  function renderOrder() {
    const table = document.getElementById("orderTable");
    table.innerHTML = "<tr><th>Item</th><th>Flavor</th><th>Qty</th><th>Price</th><th></th></tr>";
    orderTotal = 0;

    for (let item in order) {
      const row = table.insertRow();
      row.insertCell(0).textContent = item;

      const flavorCell = row.insertCell(1);
      if (item === "Boba Tea") {
        const select = document.createElement("select");
        bobaFlavors.forEach(f => {
          const option = document.createElement("option");
          option.value = f;
          option.textContent = f;
          if (order[item].flavor === f) option.selected = true;
          select.appendChild(option);
        });
        select.onchange = e => setFlavor(item, e.target.value);
        flavorCell.appendChild(select);
      } else flavorCell.textContent = "-";

      row.insertCell(2).textContent = order[item].qty;
      row.insertCell(3).textContent = `$${(order[item].qty * order[item].price).toFixed(2)}`;

      const removeCell = row.insertCell(4);
      const removeBtn = document.createElement("button");
      removeBtn.textContent = "-";
      removeBtn.className = "remove-btn";
      removeBtn.onclick = () => removeFromOrder(item);
      removeCell.appendChild(removeBtn);

      orderTotal += order[item].qty * order[item].price;
    }

    document.getElementById("total").textContent = orderTotal.toFixed(2);
    updateChange();
  }

  function handleCashInput(input) {
    let digits = input.value.replace(/\D/g, "");
    if (!digits) {
      input.value = "";
      updateChange();
      return;
    }
    let value = parseFloat(digits) / 100;
    input.value = value.toFixed(2);
    updateChange();
  }

  function updateChange() {
    const paymentMethod = document.getElementById("paymentMethod").value;
    const paidInput = document.getElementById("paid");
    
    if (paymentMethod === "Cash") {
      paidInput.style.display = "inline-block";
      document.getElementById("paidLabel").style.display = "inline-block";
      const paid = parseFloat(paidInput.value) || 0;
      const change = paid - orderTotal;
      document.getElementById("change").textContent = change >= 0 ? change.toFixed(2) : "0.00";
    } else {
      paidInput.style.display = "none";
      document.getElementById("paidLabel").style.display = "none";
      document.getElementById("change").textContent = "0.00";
    }
  }

  // =======================================================
  // 🔥 LIVE DATABASE SYNC LOGIC
  // =======================================================

  // 1. PUSH NEW ORDER TO CLOUD KITCHEN QUEUE
  async function sendToKitchen() {
    if (orderTotal === 0) return;

    const paymentMethod = document.getElementById("paymentMethod").value;
    
    const itemsString = Object.keys(order).map(item => {
      const flavor = (item === "Boba Tea" && order[item].flavor) ? ` (${order[item].flavor})` : "";
      return `${item}${flavor} x${order[item].qty}`;
    }).join(", ");

    // Generates a randomized 4-digit order number for the day
    const dynamicOrderNum = Math.floor(1000 + Math.random() * 9000); 
    const timestamp = Date.now();

    const currentOrderData = {
      id: dynamicOrderNum,
      items: itemsString,
      total: orderTotal,
      payment: paymentMethod,
      timestamp: timestamp
    };

    try {
      // Add the order directly to the Firestore collection
      await addDoc(collection(db, "kitchenQueue"), currentOrderData);
      
      // Clear local UI order inputs seamlessly
      order = {};
      document.getElementById("total").textContent = "0.00";
      document.getElementById("paid").value = "";
      document.getElementById("change").textContent = "0.00";
      document.getElementById("paymentMethod").value = "Cash";
      renderOrder();
      updateChange();
    } catch (e) {
      console.error("Error connecting to Firebase: ", e);
      alert("Could not connect to database. Make sure your Firestore Rules are set to public.");
    }
  }

  // 2. MOVE READY ORDERS FROM KITCHEN TO COMPLETED SALES
  async function finishOrder(docId, orderData) {
    try {
      // Copy order history into sales log tracking
      await addDoc(collection(db, "completedOrders"), orderData);
      // Delete from the active kitchen queue document
      await deleteDoc(doc(db, "kitchenQueue", docId));
    } catch (e) {
      console.error("Error moving order: ", e);
    }
  }

  // 3. LISTEN LIVE: Stream incoming Kitchen Queue documents instantly
  const kitchenQuery = query(collection(db, "kitchenQueue"), orderBy("timestamp", "asc"));
  onSnapshot(kitchenQuery, (snapshot) => {
    const table = document.getElementById("kitchenTable");
    table.innerHTML = "<tr><th>Order #</th><th>Items to Prepare</th><th>Payment</th><th>Action</th></tr>";

    snapshot.forEach((doc) => {
      const pOrder = doc.data();
      const docId = doc.id; // Unique document tracking string created by Firebase
      const row = table.insertRow();
      
      row.insertCell(0).textContent = pOrder.id;
      row.insertCell(1).textContent = pOrder.items;
      row.insertCell(2).textContent = pOrder.payment;
      
      const actionCell = row.insertCell(3);
      const completeBtn = document.createElement("button");
      completeBtn.textContent = "Order Ready ✓";
      completeBtn.className = "ready-btn";
      
      // Pass both the cloud document reference ID and data block
      completeBtn.onclick = () => finishOrder(docId, pOrder);
      actionCell.appendChild(completeBtn);
    });
  });

  // 4. LISTEN LIVE: Stream Completed Sales across all client devices
  const completedQuery = query(collection(db, "completedOrders"), orderBy("timestamp", "desc"));
  onSnapshot(completedQuery, (snapshot) => {
    const log = document.getElementById("salesLog");
    log.innerHTML = "<tr><th>Order #</th><th>Items</th><th>Total</th><th>Payment</th></tr>";
    
    let currentTotalSales = 0;

    snapshot.forEach((doc) => {
      const completedOrder = doc.data();
      const row = log.insertRow();
      
      row.insertCell(0).textContent = completedOrder.id;
      row.insertCell(1).textContent = completedOrder.items;
      row.insertCell(2).textContent = `$${completedOrder.total.toFixed(2)}`;
      row.insertCell(3).textContent = completedOrder.payment;

      currentTotalSales += completedOrder.total;
    });

    document.getElementById("salesTotal").textContent = currentTotalSales.toFixed(2);
  });

  // Export local visible Sales Log to CSV format
  function exportSalesCSV() {
    const table = document.getElementById("salesLog");
    let csv = [];
    for (let i = 0; i < table.rows.length; i++) {
      let row = [];
      for (let j = 0; j < table.rows[i].cells.length; j++) {
        row.push('"' + table.rows[i].cells[j].innerText + '"');
      }
      csv.push(row.join(","));
    }
    const csvFile = new Blob([csv.join("\n")], { type: "text/csv" });
    const downloadLink = document.createElement("a");
    downloadLink.download = "completed_orders.csv";
    downloadLink.href = window.URL.createObjectURL(csvFile);
    downloadLink.style.display = "none";
    document.body.appendChild(downloadLink);
    downloadLink.click();
    document.body.removeChild(downloadLink);
  }
</script>

</body>
</html>
